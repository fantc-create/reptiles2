<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動物/植物日常護理表與紀錄系統</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ecc71;
            --excel-color: #217346;
            --border-color: #ddd;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        /* 導覽列(分頁按鈕)樣式 */
        .nav-tabs {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            max-width: 200px;
            background-color: #e0e0e0;
            color: #555;
            padding: 12px 10px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        /* 區塊隱藏與顯示 */
        .section-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-in-out;
        }

        .section-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2, h3 { text-align: center; color: var(--text-color); margin-top: 0; }

        /* 輸入區塊排版 */
        .header-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 1.1em;
            background-color: #f9fbfd;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 250px;
        }

        .input-group input[type="text"], 
        .input-group input[type="date"] {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 8px 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus { border-color: var(--primary-color); }

        /* 電腦版表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #fff;
        }

        th, td {
            text-align: left;
            padding: 15px;
            border: 1px solid var(--border-color);
            vertical-align: top;
        }

        th { background-color: #f8f9fa; font-weight: bold; color: #555; white-space: nowrap; text-align: center; }
        
        /* 元件設計 */
        .checkbox-label {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
            padding: 5px 0;
        }

        .feed-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
            gap: 10px;
        }

        .feed-item .checkbox-label { margin-bottom: 0; }

        .qty-input {
            width: 70px;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            outline: none;
        }

        .checkbox-label input[type="checkbox"] {
            margin-right: 10px;
            width: 22px;
            height: 22px;
            accent-color: var(--primary-color);
        }

        .na-text { color: #aaa; font-style: italic; text-align: center; }
        .animal-name { font-weight: bold; font-size: 1.1em; text-align: center; background-color: #f0f4f8; }

        /* 按鈕區塊 */
        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .history-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            flex: 1;
            max-width: 250px;
        }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-save { background-color: var(--success-color); color: white; }
        .btn-reset { background-color: #e0e0e0; color: #333; }
        .btn-sync { background-color: var(--primary-color); color: white; }
        .btn-export { background-color: var(--excel-color); color: white; }

        /* 複製結果呈現區 */
        #copyResultArea {
            display: none;
            margin-top: 25px;
            background-color: #fff9e6;
            border: 2px dashed #ffeaa7;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        /* 手機版響應式設計：將表格轉為卡片 */
        @media (max-width: 768px) {
            .section-container { padding: 15px; }
            .header-info { flex-direction: column; gap: 15px; }
            
            table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
            thead { display: none; } 
            
            tr { 
                border: 2px solid var(--primary-color); 
                border-radius: 12px; 
                margin-bottom: 20px; 
                overflow: hidden; 
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            
            td.animal-name { 
                background-color: var(--primary-color); 
                color: white; 
                font-size: 1.3em; 
                padding: 12px; 
                text-align: center; 
            }
            
            td { 
                border: none; 
                border-bottom: 1px solid #eee; 
                padding: 15px; 
                position: relative; 
            }
            
            td:last-child { border-bottom: none; }
            
            td:not(.animal-name)::before { 
                content: attr(data-label); 
                font-weight: bold; 
                color: var(--primary-color); 
                display: block; 
                margin-bottom: 8px; 
                font-size: 0.9em;
                border-bottom: 2px dashed #eee;
                padding-bottom: 5px;
            }
            
            .na-text { text-align: left; color: #999; }
        }

        .record-item-details { line-height: 1.8; margin-top: 5px; }
        .empty-msg { text-align: center; color: #999; padding: 40px 20px; }

        /* 載入中遮罩層 */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--primary-color);
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="historySection" class="section-container">

        <button class="btn-sync" onclick="loadRecords()">🔄 重新整理 / 同步最新紀錄</button>
        <button class="btn-export" onclick="exportToExcel()">📥 匯出至 Excel (CSV)</button>

                    <th style="width: 60%;">完成項目</th>

<script>
    // ==========================================
    // ⚠️ 免 API 設定：請填入你的 Google 試算表資訊 ⚠️
    // ==========================================
    // 1. 請在此填入試算表 ID（網址列中 /d/ 後面那一長串英數組合）
    const SPREADSHEET_ID = "請把你的_GOOGLE_試算表_ID_貼在這裡";
    
    // 2. 請在此貼上共用網址（設為：知道連結的任何人都可以檢視）
    const SPREADSHEET_URL = "請把你的_GOOGLE_試算表_共用網址_貼在這裡";
    // ==========================================

    // 全域變數：用於儲存從試算表直接下載的歷史纪录
    let currentCloudRecords = [];

    document.addEventListener('DOMContentLoaded', () => {
        setToday();
    });

    function showLoading(text) {
        document.getElementById('loadingText').innerText = text;
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    function switchTab(tabId) {
        document.getElementById('btn-form').classList.remove('active');
        document.getElementById('btn-history').classList.remove('active');
        document.getElementById('formSection').classList.remove('active');
        document.getElementById('historySection').classList.remove('active');

        if (tabId === 'form') {
            document.getElementById('btn-form').classList.add('active');
            document.getElementById('formSection').classList.add('active');
        } else if (tabId === 'history') {
            document.getElementById('btn-history').classList.add('active');
            document.getElementById('historySection').classList.add('active');
            // 切換到歷史紀錄時自動讀取一次
            if(SPREADSHEET_ID !== "請把你的_GOOGLE_試算表_ID_貼在這裡") {
                loadRecords();
            } else {
                alert("請先在程式碼中設定 SPREADSHEET_ID 才能讀取雲端同步歷史紀錄！");
            }
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setToday() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('recordDate').value = today;
    }

    // 🌟 免 API 直接透過雲端視覺化接口讀取公開的 Google 試算表 🌟
    function loadRecords() {
        if(SPREADSHEET_ID === "請把你的_GOOGLE_試算表_ID_貼在這裡") return;

        showLoading("正在免 API 直連雲端同步中...");
        
        // 使用 Google 試算表的 Visualization Query URL (完全免 API key，安全且支援儲存格內換行)
        const gvizUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        fetch(gvizUrl)
            .then(response => response.text())
            .then(text => {
                // 清理回傳的外殼字串，將其轉為純 JSON
                const jsonText = text.slice(text.indexOf("{"), text.lastIndexOf("}") + 1);
                const json = JSON.parse(jsonText);
                const rows = json.table.rows;
                
                currentCloudRecords = [];

                if (rows && rows.length > 0) {
                    rows.forEach((row) => {
                        if (!row || !row.c) return;
                        // 讀取 A, B, C 三個欄位
                        let date = row.c[0] ? (row.c[0].f || row.c[0].v || "") : "";
                        let student = row.c[1] ? (row.c[1].v || "") : "";
                        let details = row.c[2] ? (row.c[2].v || "") : "";

                        // 略過首列標題列
                        if (date === "日期" || (!date && !student && !details)) return;

                        // 還原換行符號為網頁 <br>
                        let safeDetails = String(details).replace(/\n/g, "<br>");

                        currentCloudRecords.push({
                            date: date,
                            studentName: student,
                            details: safeDetails
                        });
                    });
                }

                const recordList = document.getElementById('recordList');
                recordList.innerHTML = ''; 

                if (currentCloudRecords.length === 0) {
                    recordList.innerHTML = '<tr><td colspan="3" class="empty-msg">目前雲端尚未有任何紀錄</td></tr>';
                } else {
                    // 倒序排列，最新的紀錄在最上面
                    currentCloudRecords.slice().reverse().forEach((record) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${record.date}</td>
                            <td><strong>${record.studentName}</strong></td>
                            <td><div class="record-item-details">${record.details}</div></td>
                        `;
                        recordList.appendChild(tr);
                    });
                }
                hideLoading();
            })
            .catch(error => {
                console.error('讀取失敗:', error);
                alert("同步失敗！請確認試算表已開啟「知道連結的任何人都可以檢視」權限，且 ID 是否正確。");
                hideLoading();
            });
    }

    // 🌟 打包數據並巧妙利用 Tab 鍵實現「免 API 跨欄位貼上」功能 🌟
    function generateAndCopyRecord() {
        const studentName = document.getElementById('studentName').value.trim();
        const date = document.getElementById('recordDate').value;
        
        if (!studentName || !date) {
            alert('請填寫「負責學生姓名」與「日期」！');
            return;
        }

        const rows = document.querySelectorAll('#careTable tbody tr');
        let completedItems = [];

        rows.forEach(row => {
            const rawAnimalName = row.querySelector('.animal-name').innerText;
            const animalName = rawAnimalName.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]\s*/g, '').trim(); 
            const checkedBoxes = row.querySelectorAll('input[type="checkbox"]:checked');
            
            if (checkedBoxes.length > 0) {
                let actions = Array.from(checkedBoxes).map(cb => {
                    let actionText = cb.value;
                    if (cb.classList.contains('feed-checkbox')) {
                        const wrapper = cb.closest('.feed-item');
                        const qtyInput = wrapper.querySelector('.qty-input');
                        if (qtyInput && qtyInput.value.trim() !== '') {
                            actionText += ` (數量: ${qtyInput.value})`;
                        }
                    }
                    return actionText;
                });
                completedItems.push(`【${animalName}】\n${actions.join('、')}`);
            }
        });

        if (completedItems.length === 0) {
            alert('請至少勾選一項完成的護理任務！');
            return;
        }

        // 重要科技：使用 \t (Tab) 隔開數據，當貼上到 Excel/Google 試算表時，會自動拆分到 A、B、C 三個欄位
        // 在完成項目外加上雙引號，可以確保裡面的換行不會破壞 Excel 的列格式
        const detailsText = completedItems.join('\n\n');
        const pasteString = `${date}\t${studentName}\t"${detailsText.replace(/"/g, '""')}"`;

        // 寫入剪貼簿
        navigator.clipboard.writeText(pasteString).then(() => {
            document.getElementById('copyResultArea').style.display = 'block';
            window.scrollTo({
                top: document.getElementById('copyResultArea').offsetTop,
                behavior: 'smooth'
            });
        }).catch(err => {
            // 老舊手機手機相容備用方案
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = pasteString;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
            
            document.getElementById('copyResultArea').style.display = 'block';
            window.scrollTo({
                top: document.getElementById('copyResultArea').offsetTop,
                behavior: 'smooth'
            });
        });
    }

    function goToGoogleSheet() {
        if(SPREADSHEET_URL === "請把你的_GOOGLE_試算表_共用網址_貼在這裡") {
            alert("請先在程式碼中填寫 SPREADSHEET_URL！");
            return;
        }
        window.open(SPREADSHEET_URL, '_blank');
    }

    function resetForm(showConfirm) {
        if (!showConfirm || confirm('確定要清除畫面上所有已填寫的資料嗎？')) {
            document.getElementById('studentName').value = '';
            setToday();
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.qty-input').forEach(input => input.value = '');
            document.getElementById('copyResultArea').style.display = 'none';
        }
    }

    // 匯出功能：從剛才免 API 抓下來的陣列直接轉成網頁端下載的 Excel (CSV)
    function exportToExcel() {
        if (currentCloudRecords.length === 0) {
            alert('目前沒有同步好的雲端紀錄可以匯出！請先點擊「重新整理」按鈕。');
            return;
        }

        let csvContent = '\uFEFF'; // 加入 BOM 確保 Excel 開啟不亂碼
        csvContent += '日期,負責學生,完成項目\n';

        currentCloudRecords.forEach(record => {
            // 清理 HTML 標籤
            let textDetails = record.details
                .replace(/<br><br>/g, ' \n ') 
                .replace(/<br>/g, ' / ')        
                .replace(/<strong>/g, '')
                .replace(/<\/strong>/g, '');
            
            let safeName = `"${record.studentName.replace(/"/g, '""')}"`;
            let safeDetails = `"${textDetails.replace(/"/g, '""')}"`;
            
            csvContent += `${record.date},${safeName},${safeDetails}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `雲端動物護理紀錄匯出_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
