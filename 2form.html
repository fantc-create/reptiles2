<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動物/植物日常護理雲端系統</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ecc71;
            --border-color: #ddd;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang HK", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .nav-tabs {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            max-width: 200px;
            background-color: #e0e0e0;
            color: #555;
            padding: 12px 10px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .section-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .section-container.active { display: block; }

        h2, h3 { text-align: center; color: var(--text-color); margin-top: 0; }

        .header-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 1.1em;
            background-color: #f9fbfd;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 250px;
        }

        .input-group input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 8px 10px;
            font-size: 1em;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #fff; }
        th, td { text-align: left; padding: 15px; border: 1px solid var(--border-color); vertical-align: top; }
        th { background-color: #f8f9fa; font-weight: bold; color: #555; text-align: center; }
        
        .checkbox-label { display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .feed-item { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 10px; gap: 10px; }
        .qty-input { width: 70px; padding: 6px 8px; border: 1px solid var(--border-color); border-radius: 4px; }
        .checkbox-label input[type="checkbox"] { margin-right: 10px; width: 22px; height: 22px; accent-color: var(--primary-color); }
        .na-text { color: #aaa; font-style: italic; text-align: center; }
        .animal-name { font-weight: bold; font-size: 1.1em; text-align: center; background-color: #f0f4f8; }

        .actions { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 25px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: var(--success-color); color: white; width: 100%; max-width: 300px; }
        .btn-reset { background-color: #e0e0e0; color: #333; }

        /* 歷史紀錄獨立美化表格 */
        .history-table th { background-color: #2c3e50; color: white; }
        .record-details { line-height: 1.6; white-space: pre-line; color: #444; }

        /* 手機版卡片化自動轉換 */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
            thead { display: none; }
            tr { border: 2px solid var(--primary-color); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
            td.animal-name { background-color: var(--primary-color); color: white; font-size: 1.2em; text-align: center; }
            td { border: none; border-bottom: 1px solid #eee; padding: 12px; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--primary-color); display: block; margin-bottom: 5px; font-size: 0.9em; }
            .na-text::before { display: none; }
            .na-text { text-align: left; color: #ccc; }
        }

        /* Loading 遮罩 */
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 999; justify-content: center; align-items: center; font-size: 1.2em; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

<div id="historySection" class="section-container">
    <h3>📋 班級歷史護理紀錄 (雲端同步)</h3>
    <table class="history-table">
        <thead>
            <tr><th style="width: 20%;">日期</th><th style="width: 20%;">負責學生</th><th style="width: 60%;">完成項目</th></tr>
        </thead>
        <tbody id="historyList">
            <tr><td colspan="3" style="text-align:center; color:#999; padding:30px;">正在加載雲端資料...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // ========================================================
    // ⚠️ 只需要在這裡填入你的 Google 表單與試算表資料，即可啟動雲端
    // ========================================================
    const GOOGLE_FORM_ID = "1FAIpQLSdDOLdH348TldZy6OIsI5BmL6GHCNuKtq5QxVuAzzQi-K0PxQ"; 
    
    // ✅ 已經幫你填好試算表 ID 囉！
    const SPREADSHEET_ID = "1igi8oFPaC4PTduqaep-RB9jpAFP4G8umdg6Tstdrmfk"; 
    
    // 請填入表單三個問題對應的 entry ID
    const ENTRY_DATE = "entry.2133590603"; // 日期的代碼
    const ENTRY_NAME = "entry.801019313"; // 學生姓名的代碼
    const ENTRY_TEXT = "entry.668473026"; // 完成項目的代碼
    // ========================================================

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];
    });

    function switchTab(tabId) {
        document.getElementById('btn-form').classList.remove('active');
        document.getElementById('btn-history').classList.remove('active');
        document.getElementById('formSection').classList.remove('active');
        document.getElementById('historySection').classList.remove('active');

        if (tabId === 'form') {
            document.getElementById('btn-form').classList.add('active');
            document.getElementById('formSection').classList.add('active');
        } else {
            document.getElementById('btn-history').classList.add('active');
            document.getElementById('historySection').classList.add('active');
            loadHistory();
        }
    }

    // 上傳到雲端
    function uploadToCloud() {
        const name = document.getElementById('studentName').value.trim();
        const date = document.getElementById('recordDate').value;
        if (!name) { alert('請輸入負責學生姓名！'); return; }

        let completed = [];
        document.querySelectorAll('#careTable tbody tr').forEach(row => {
            const animal = row.querySelector('.animal-name').innerText.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]\s*/g, '').trim();
            const checked = row.querySelectorAll('input[type="checkbox"]:checked');
            if (checked.length > 0) {
                let details = Array.from(checked).map(cb => {
                    let text = cb.value;
                    if (cb.classList.contains('feed-cb')) {
                        const qty = cb.closest('.feed-item').querySelector('.qty-input').value;
                        if (qty) text += ` (數量: ${qty})`;
                    }
                    return text;
                });
                completed.push(`【${animal}】\n${details.join('、')}`);
            }
        });

        if (completed.length === 0) { alert('請至少勾選一項護理項目！'); return; }
        
        // 檢查是否有設定表單 ID
        if (GOOGLE_FORM_ID === "請填入你的_Google表單ID") {
            alert('⚠️ 系統提示：你還沒有設定「Google 表單 ID」，目前無法上傳資料喔！請參考說明補上代碼。');
            return;
        }

        const fullText = completed.join('\n\n');
        document.getElementById('loading').style.display = 'flex';

        // 打包數據
        const formData = new URLSearchParams();
        formData.append(ENTRY_DATE, date);
        formData.append(ENTRY_NAME, name);
        formData.append(ENTRY_TEXT, fullText);

        // 發送到 Google 表單後台
        fetch(`https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' 
        }).then(() => {
            document.getElementById('loading').style.display = 'none';
            alert('🎉 成功上傳雲端資料庫！');
            resetForm(false);
            switchTab('history'); 
        }).catch(err => {
            document.getElementById('loading').style.display = 'none';
            alert('連線失敗，請檢查網路或設定！');
        });
    }

    // 抓取雲端歷史紀錄
    function loadHistory() {
        if (!SPREADSHEET_ID || SPREADSHEET_ID.includes("請填入")) {
            document.getElementById('historyList').innerHTML = `<tr><td colspan="3" style="text-align:center;color:#999;">尚未設定試算表 ID</td></tr>`;
            return;
        }
        
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        fetch(url).then(res => res.text()).then(text => {
            try {
                const json = JSON.parse(text.slice(text.indexOf("{"), text.lastIndexOf("}") + 1));
                const rows = json.table.rows;
                let html = '';
                
                if (rows && rows.length > 0) {
                    // 倒序顯示（最新的在最上面），不一定跳過第一列（視表單標題而定）
                    let startIndex = (rows[0].c[0] && rows[0].c[0].v === "時間戳記") ? 1 : 0;
                    
                    for (let i = rows.length - 1; i >= startIndex; i--) {
                        const r = rows[i].c;
                        if(!r || !r[0]) continue;
                        const date = r[0].f || r[0].v || "";
                        const name = r[1] ? (r[1].v || "") : "";
                        const detail = r[2] ? (r[2].v || "") : "";
                        
                        // 確保這列有資料才顯示
                        if (name || detail) {
                            html += `<tr>
                                <td>${date}</td>
                                <td><strong>${name}</strong></td>
                                <td class="record-details">${detail}</td>
                            </tr>`;
                        }
                    }
                    if (html === '') html = `<tr><td colspan="3" style="text-align:center;color:#999;">目前尚無雲端紀錄</td></tr>`;
                    document.getElementById('historyList').innerHTML = html;
                } else {
                    document.getElementById('historyList').innerHTML = `<tr><td colspan="3" style="text-align:center;color:#999;">目前尚無雲端紀錄</td></tr>`;
                }
            } catch(e) {
                document.getElementById('historyList').innerHTML = `<tr><td colspan="3" style="text-align:center;color:red;">讀取失敗：請確定試算表權限已設為「知道連結的任何人都可以檢視」</td></tr>`;
            }
        }).catch(err => {
            document.getElementById('historyList').innerHTML = `<tr><td colspan="3" style="text-align:center;color:red;">網路連線錯誤或試算表設定錯誤</td></tr>`;
        });
    }

    function resetForm(confirmAction) {
        if (!confirmAction || confirm('確定要清空表格嗎？')) {
            document.getElementById('studentName').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.qty-input').forEach(input => input.value = '');
        }
    }
</script>
</body>
</html>
